name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck bin/revive install.sh

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install bats
        uses: bats-core/bats-action@3.0.1
      - name: install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: run tests
        run: bats tests/
